<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- subtle grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- monogram -->
  <rect x="80" y="80" width="56" height="56" rx="10" fill="#fafafa"/>
  <text x="108" y="118" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="26" font-weight="700" fill="#0a0a0a">fs</text>

  <!-- main title -->
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif"
        font-size="64" font-weight="600" fill="#fafafa" letter-spacing="-1.5">
    fashion visual search
  </text>
  <text x="80" y="332" font-family="Inter, system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#a3a3a3">
    44k products · clip embeddings · learned reranker
  </text>

  <!-- metric boxes -->
  <g transform="translate(80, 410)">
    <rect width="320" height="120" rx="8" fill="#131313" stroke="#1f1f1f"/>
    <text x="24" y="44" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#737373" letter-spacing="2">RECALL@10</text>
    <text x="24" y="92" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" fill="#fafafa">+223%</text>
  </g>
  <g transform="translate(420, 410)">
    <rect width="320" height="120" rx="8" fill="#131313" stroke="#1f1f1f"/>
    <text x="24" y="44" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#737373" letter-spacing="2">NDCG@10</text>
    <text x="24" y="92" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" fill="#fafafa">+172%</text>
  </g>
  <g transform="translate(760, 410)">
    <rect width="320" height="120" rx="8" fill="#131313" stroke="#1f1f1f"/>
    <text x="24" y="44" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#737373" letter-spacing="2">MAP@10</text>
    <text x="24" y="92" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" fill="#fafafa">+219%</text>
  </g>

  <!-- footer line -->
  <text x="80" y="588" font-family="Inter, system-ui, sans-serif"
        font-size="18" fill="#525252">
    evaluated on 3,878 held-out queries
  </text>
  <text x="1120" y="588" text-anchor="end" font-family="Inter, system-ui, sans-serif"
        font-size="18" fill="#525252">
    github.com/nitishpatil18/fashion-visual-search
  </text>
</svg>